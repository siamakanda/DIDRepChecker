name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e src/

      - name: Run tests
        run: pytest tests -v

  validate-extension:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate extension manifest
        run: |
          python -c "
          import json, sys
          with open('extension/manifest.json') as f:
              m = json.load(f)
          assert m.get('manifest_version') == 3, 'Must be MV3'
          assert 'service_worker' in m.get('background', {}), 'Must use service_worker'
          print('Manifest V3 — valid')
          "
