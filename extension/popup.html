<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>DID Reputation Selector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
<div class="tabs">
  <button class="tab active" data-tab="numbers">📞 Numbers</button>
  <button class="tab" data-tab="results">📊 Results</button>
  <button class="tab" data-tab="settings">⚙️ Settings</button>
</div>

<!-- Stats Bar -->
<div class="stats-bar">
  <div class="stats-card"><div class="label">📦 Captured</div><span id="statCaptured">0</span></div>
  <div class="stats-card"><div class="label">📤 Sent</div><span id="statSent">0</span></div>
  <div class="stats-card"><div class="label">📊 Results</div><span id="statResults">0</span></div>
  <div class="stats-card"><div class="label">✅ Selected</div><span id="statSelectedOnPage">0</span></div>
</div>

<!-- Numbers Tab -->
<div id="numbersPanel" class="panel active-panel">
  <!-- Paste Section -->
  <div class="paste-section">
    <button id="showPasteBoxBtn" class="secondary">📋 Paste Numbers</button>
    <div id="pasteBox" style="display: none;">
      <textarea id="pasteNumbersTextarea" rows="3" placeholder="Enter phone numbers (one per line, comma, space)"></textarea>
      <div class="paste-buttons">
        <button id="usePastedNumbersBtn" class="success">Use Pasted</button>
        <button id="cancelPasteBtn" class="secondary">Cancel</button>
      </div>
    </div>
    <button id="resetToCapturedBtn" class="secondary" style="display: none;">↻ Reset to Captured</button>
  </div>

  <!-- Number List -->
  <div class="list-header">
    <span>Available Numbers</span>
    <div>
      <button id="selectAllBtn" class="secondary tiny">Check All</button>
      <button id="deselectAllBtn" class="secondary tiny">Uncheck All</button>
    </div>
  </div>
  <div class="number-list" id="numbersContainer">Loading numbers...</div>

  <!-- Action Bar -->
  <div class="action-bar">
    <button id="sendSelectedBtn" class="success">📤 Check Reputation (Selected)</button>
    <div class="action-right">
      <span>Top <input type="number" id="topNPage" value="70" min="1" class="input-small"></span>
      <button id="sendTopPageBtn">Send Top N</button>
    </div>
  </div>
</div>

<!-- Results Tab -->
<div id="resultsPanel" class="panel">
  <div id="resultsPlaceholder" class="empty-state">No results yet.<br>Send numbers from the Numbers tab.</div>
  <div id="resultsContent" style="display:none;">
    <!-- Filter & Sort Bar -->
    <div class="filter-bar">
      <select id="filterSelect">
        <option value="all">All</option>
        <option value="Positive">✅ Positive</option>
        <option value="Negative">❌ Negative</option>
        <option value="Neutral">🟡 Neutral</option>
        <option value="Blocked">🚫 Blocked/Error</option>
      </select>
      <select id="sortSelect">
        <option value="total_calls">Total Calls</option>
        <option value="user_reports">User Reports</option>
        <option value="reputation">Reputation</option>
        <option value="phone_number">Phone Number</option>
      </select>
      <button id="sortAscBtn" class="secondary tiny">▲ Asc</button>
      <button id="sortDescBtn" class="secondary tiny">▼ Desc</button>
      <div style="flex:1"></div>
      <button id="copyResultsBtn" class="secondary tiny">📋 Copy DIDs</button>
      <button id="retryErrorsBtn" class="secondary tiny">🔄 Retry</button>
    </div>

    <!-- Results Table -->
    <div class="results-container">
      <table id="resultsTable">
        <thead>
          <tr>
            <th class="checkbox-col"><input type="checkbox" id="selectAllRows"></th>
            <th data-field="phone_number">DID</th>
            <th data-field="reputation">Reputation</th>
            <th data-field="robokiller_status">Robokiller</th>
            <th data-field="total_calls">Calls</th>
            <th data-field="user_reports">Rpts</th>
            <th data-field="last_call">Last Call</th>
          </tr>
        </thead>
        <tbody id="resultsBody"></tbody>
      </table>
    </div>
    <div class="results-footer">Showing <span id="displayedCount">0</span> of <span id="totalResultCount">0</span> DIDs</div>

    <!-- Action Bar -->
    <div class="action-bar">
      <div class="action-left">
        <span>Top <input type="number" id="topNResults" value="20" min="1" class="input-small"></span>
        <button id="selectTopResultsBtn" class="success">Select on Page (Top N)</button>
      </div>
      <div class="action-right">
        <button id="selectCheckedResultsBtn" class="success">Select Checked</button>
        <button id="exportResultsBtn" class="secondary tiny">💾 Export CSV</button>
        <button id="clearResultsBtn" class="secondary tiny">🗑️ Clear</button>
      </div>
    </div>
  </div>
</div>

<!-- Settings Tab -->
<div id="settingsPanel" class="panel">
  <div class="section-title">🌐 API Endpoints (fallback order)</div>
  <div id="apiUrlsList"></div>
  <div class="add-endpoint">
    <input type="text" id="newApiUrl" placeholder="http://.../scrape">
    <button id="addApiUrlBtn">➕ Add</button>
  </div>
  <div id="apiStatus" class="status"></div>
  <hr>
  <div class="settings-row">
    <button id="clearStorageBtn" class="secondary">🗑️ Clear Stored Results</button>
    <div class="toggle-container">
      <span>🌙 Dark Mode</span>
      <label class="switch">
        <input type="checkbox" id="darkModeToggle">
        <span class="slider"></span>
      </label>
    </div>
  </div>
  <div class="footer-version">Version 2.0</div>
</div>

<div id="progressOverlay" class="progress-overlay">
  <div class="spinner">
    <div id="progressText">Checking reputation...</div>
  </div>
</div>

<script src="popup.js"></script>
</body>
</html>
